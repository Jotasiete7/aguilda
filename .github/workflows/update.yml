name: Update Trade Insights

on:
  push:
    paths:
      - 'data/raw/*.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  process-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas

      - name: Process trade data
        run: |
          python scripts/main.py

      - name: Commit and push processed data
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/processed/*
          git commit -m "Atualização automática de dados processados" || echo "Nada a commitar"
          git pull --rebase origin main || echo "Sem rebase necessário"
          git push origin main
